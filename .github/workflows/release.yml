name: Build and publish release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore EdgeWorkspaceManager.csproj
      - name: Publish application
        run: dotnet publish EdgeWorkspaceManager.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:BuildCommit=${{ github.sha }} -o artifacts/app
      - name: Publish updater
        run: dotnet publish Updater/EdgeWorkspaceManager.Updater.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o artifacts/updater
      - name: Package and create manifest
        shell: pwsh
        run: |
          Copy-Item artifacts/updater/EdgeWorkspaceManager.Updater.exe artifacts/app/
          Compress-Archive -Path artifacts/app/* -DestinationPath artifacts/EdgeWorkspaceManager-win-x64.zip
          $hash = (Get-FileHash artifacts/EdgeWorkspaceManager-win-x64.zip -Algorithm SHA256).Hash
          $size = (Get-Item artifacts/EdgeWorkspaceManager-win-x64.zip).Length
          $version = '${{ github.ref_name }}'.TrimStart('v')
          $manifest = Get-Content update-manifest.template.json -Raw | ConvertFrom-Json
          $manifest.version = $version
          $manifest.releaseDate = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')
          $manifest.sha256 = $hash
          $manifest.size = $size
          $manifest | ConvertTo-Json -Depth 5 | Set-Content artifacts/update.json -Encoding utf8
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/EdgeWorkspaceManager-win-x64.zip
            artifacts/update.json
